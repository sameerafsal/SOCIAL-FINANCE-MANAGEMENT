<!DOCTYPE html>
<html>

<body style="background:#1a002e;color:white;text-align:center;font-family:Arial">

<h1>💳 Add Loan Request</h1>

<form action="/insertloan" method="POST">


<label>Select User</label><br><br>

<select name="user_id" required>

<option value="">Choose User</option>

{% for user in users %}

<option value="{{ user[0] }}">

{{ user[0] }} - {{ user[1] }}

</option>

{% endfor %}

</select>

<br><br>


<input name="amount" placeholder="Loan Amount" required>

<br><br>

<input name="interest" placeholder="Interest Rate (%)" required>

<br><br>

<input name="duration" placeholder="Duration (months)" required>

<br><br>

<button type="submit">

Submit Loan Request

</button>

</form>

</body>

</html>
